<div class="sm-crud-list">
  <ui-card [showHeader]="true" class="sm-crud-card">
    <div class="sm-crud-toolbar" card-header>
      <form class="sm-crud-form" [formGroup]="formData" (ngSubmit)="filtrar()">
        <div class="sm-crud-filter-row">
          <div class="sm-crud-filters">
            <ui-text-field
              class="sm-field-xs"
              [label]="'Empresa ID'"
              formControlName="ideEmpr"
            />

            <ui-input-box
              class="sm-field-md"
              [label]="'Cédula'"
              [options]="opcionesCedula"
              [returnValue]="'label'"
              formControlName="cedulaProv"
            />

            <ui-input-box
              class="sm-field-md"
              [label]="'Nombre'"
              [options]="opcionesPrimerNombre"
              [returnValue]="'label'"
              formControlName="primerNombreProv"
            />

            <ui-input-box
              class="sm-field-lg"
              [label]="'Apellido'"
              [options]="opcionesApellidoPaterno"
              [returnValue]="'label'"
              formControlName="apellidoPaternoProv"
            />

            <ui-input-box
              class="sm-field-xl"
              [label]="'Email'"
              [options]="opcionesEmail"
              [returnValue]="'label'"
              formControlName="emailProv"
            />
          </div>

          <div class="sm-crud-filter-button">
            <ui-button
              [label]="'Filtrar'"
              [icon]="'filter_alt'"
              [action]="'filter'"
              (evntClick)="filtrar()"
            />
          </div>
        </div>
      </form>

      <div class="sm-crud-actions">
        <ui-button
          [icon]="'refresh'"
          [action]="'refresh'"
          (evntClick)="refreshData($event)"
        />
      </div>
    </div>

    <div class="sm-crud-table">
      <ui-table-list
        #tableList
        [serviceApi]="'proveedores'"
        [serviceApiFilter]="'proveedores/filtrar'"
        [serviceApiReal]="'proveedores'"
        [columns]="config.columns"
      />
    </div>
  </ui-card>
</div>
