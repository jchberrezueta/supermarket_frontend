<div class="sm-crud-list">
  <ui-card [showHeader]="true" class="sm-crud-card">
    <div class="sm-crud-toolbar" card-header>
      <form class="sm-crud-form" [formGroup]="formData" (ngSubmit)="filtrar()">
        <div class="sm-crud-filter-row">
          <div class="sm-crud-filters">
            <ui-input-box
              class="sm-field-lg"
              [label]="'Empresa'"
              [options]="opcionesEmpresas"
              [returnValue]="'label'"
              formControlName="nombreEmpr"
            />

            <ui-combo-box
              class="sm-field-sm"
              [label]="'Estado'"
              [options]="opcionesEstadosPedi"
              [returnValue]="'label'"
              formControlName="estadoPedi"
            />

            <ui-combo-box
              class="sm-field-sm"
              [label]="'Motivo'"
              [options]="opcionesMotivosPedi"
              [returnValue]="'label'"
              formControlName="motivoPedi"
            />

            <ui-datetime-picker
              class="sm-field-date"
              [label]="'Desde'"
              formControlName="fechaPediDesde"
            />

            <ui-datetime-picker
              class="sm-field-date"
              [label]="'Hasta'"
              formControlName="fechaPediHasta"
            />
          </div>

          <div class="sm-crud-filter-button">
            <ui-button
              [label]="'Filtrar'"
              [icon]="'filter_alt'"
              [action]="'filter'"
              (evntClick)="filtrar()"
            />
          </div>
        </div>
      </form>

      <div class="sm-crud-actions">
        <ui-button
          [icon]="'refresh'"
          [action]="'refresh'"
          (evntClick)="refreshData($event)"
        />
      </div>
    </div>

    <div class="sm-crud-table">
      <ui-table-list
        #tableList
        [serviceApi]="'pedidos'"
        [serviceApiFilter]="'pedidos/filtrar'"
        [serviceApiReal]="'pedidos'"
        [columns]="config.columns"
      />
    </div>
  </ui-card>
</div>
