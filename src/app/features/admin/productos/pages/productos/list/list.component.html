<div class="sm-crud-list">
  <ui-card [showHeader]="true" class="sm-crud-card">
    <div class="sm-crud-toolbar" card-header>
      <form class="sm-crud-form" [formGroup]="formData" (ngSubmit)="filtrar()">
        <div class="sm-crud-filter-row">
          <div class="sm-crud-filters">
            <ui-input-box
              class="sm-field-md"
              [label]="'Categoría'"
              [options]="opcionesCategorias"
              formControlName="ideCate"
            />

            <ui-input-box
              class="sm-field-md"
              [label]="'Marca'"
              [options]="opcionesMarcas"
              formControlName="ideMarc"
            />

            <ui-input-box
              class="sm-field-lg"
              [label]="'Nombre'"
              [options]="opcionesProdNombres"
              [returnValue]="'label'"
              formControlName="nombreProd"
            />

            <ui-input-box
              class="sm-field-md"
              [label]="'Código barras'"
              [options]="opcionesProdCodBarras"
              formControlName="codigoBarraProd"
            />

            <ui-combo-box
              class="sm-field-sm"
              [label]="'Estado'"
              [options]="opcionesProdEstados"
              formControlName="estadoProd"
            />

            <ui-combo-box
              class="sm-field-sm"
              [label]="'Disponible'"
              [options]="opcionesProdDisponibilidad"
              formControlName="disponibleProd"
            />
          </div>

          <div class="sm-crud-filter-button">
            <ui-button
              [label]="'Filtrar'"
              [icon]="'filter_alt'"
              [action]="'filter'"
              (evntClick)="filtrar()"
            />
          </div>
        </div>
      </form>

      <div class="sm-crud-actions">
        <ui-button
          [icon]="'refresh'"
          [action]="'refresh'"
          (evntClick)="refreshData($event)"
        />
      </div>
    </div>

    <div class="sm-crud-table">
      <ui-table-list
        #tableList
        [serviceApi]="'productos'"
        [serviceApiFilter]="'productos/filtrar'"
        [serviceApiReal]="'productos'"
        [columns]="config.columns"
      />
    </div>
  </ui-card>
</div>
