<div class="sm-crud-list">
  <ui-card [showHeader]="true" class="sm-crud-card">
    <div class="sm-crud-toolbar" card-header>
      <form class="sm-crud-form" [formGroup]="formData" (ngSubmit)="filtrar()">
        <div class="sm-crud-filter-row">
          <div class="sm-crud-filters">
            <ui-input-box
              class="sm-field-lg"
              [label]="'Marca'"
              [options]="opcionesNombres"
              [returnValue]="'label'"
              formControlName="nombreMarc"
            />

            <ui-input-box
              class="sm-field-lg"
              [label]="'País origen'"
              [options]="opcionesPais"
              [returnValue]="'label'"
              formControlName="paisOrigenMarc"
            />

            <ui-combo-box
              class="sm-field-sm"
              [label]="'Calidad'"
              [options]="opcionesCalidad"
              formControlName="calidadMarc"
            />
          </div>

          <div class="sm-crud-filter-button">
            <ui-button
              [label]="'Filtrar'"
              [icon]="'filter_alt'"
              [action]="'filter'"
              (evntClick)="filtrar()"
            />
          </div>
        </div>
      </form>

      <div class="sm-crud-actions">
        <ui-button
          [icon]="'refresh'"
          [action]="'refresh'"
          (evntClick)="refreshData($event)"
        />
      </div>
    </div>

    <div class="sm-crud-table">
      <ui-table-list
        #tableList
        [serviceApi]="'marcas'"
        [serviceApiFilter]="'marcas/filtrar'"
        [serviceApiReal]="'marcas'"
        [columns]="config.columns"
      />
    </div>
  </ui-card>
</div>
