<div class="sm-crud-list">
  <ui-card [showHeader]="true" class="sm-crud-card">
    <div class="sm-crud-toolbar" card-header>
      <form class="sm-crud-form" [formGroup]="formData" (ngSubmit)="filtrar()">
        <div class="sm-crud-filter-row">
          <div class="sm-crud-filters">
            <ui-input-box
              class="sm-field-md"
              [label]="'Cédula'"
              [options]="opcionesCedulas"
              [returnValue]="'label'"
              formControlName="cedulaClie"
            />

            <ui-input-box
              class="sm-field-md"
              [label]="'Nombre'"
              [options]="opcionesNombre"
              [returnValue]="'label'"
              formControlName="primerNombreClie"
            />

            <ui-input-box
              class="sm-field-md"
              [label]="'Apellido'"
              [options]="opcionesApellido"
              [returnValue]="'label'"
              formControlName="apellidoPaternoClie"
            />

            <ui-combo-box
              class="sm-field-sm"
              [label]="'Socio'"
              [options]="opcionesSocio"
              [returnValue]="'label'"
              formControlName="esSocio"
            />

            <ui-combo-box
              class="sm-field-md"
              [label]="'Tercera edad'"
              [options]="opcionesTerceraEdad"
              [returnValue]="'label'"
              formControlName="esTerceraEdad"
            />
          </div>

          <div class="sm-crud-filter-button">
            <ui-button
              [label]="'Filtrar'"
              [icon]="'filter_alt'"
              [action]="'filter'"
              (evntClick)="filtrar()"
            />
          </div>
        </div>
      </form>

      <div class="sm-crud-actions">
        <ui-button
          [icon]="'refresh'"
          [action]="'refresh'"
          (evntClick)="refreshData($event)"
        />
      </div>
    </div>

    <div class="sm-crud-table">
      <ui-table-list
        #tableList
        [serviceApi]="'clientes'"
        [serviceApiFilter]="'clientes/filtrar'"
        [serviceApiReal]="'clientes'"
        [columns]="config.columns"
      />
    </div>
  </ui-card>
</div>
