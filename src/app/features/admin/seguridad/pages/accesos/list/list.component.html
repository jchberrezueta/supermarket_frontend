<div class="sm-crud-list">
  <ui-card [showHeader]="true" class="sm-crud-card">
    <div class="sm-crud-toolbar" card-header>
      <form class="sm-crud-form" [formGroup]="formData" (ngSubmit)="filtrar()">
        <div class="sm-crud-filter-row">
          <div class="sm-crud-filters">
            <ui-input-box
              class="sm-field-lg"
              [label]="'Usuario'"
              [options]="opcionesCuentas"
              formControlName="ideCuen"
            />

            <ui-input-box
              class="sm-field-md"
              [label]="'IP'"
              [options]="opcionesIps"
              [returnValue]="'label'"
              formControlName="ipAcce"
            />

            <ui-input-box
              class="sm-field-lg"
              [label]="'Navegador'"
              [options]="opcionesNavegadores"
              [returnValue]="'label'"
              formControlName="navegadorAcce"
            />

            <ui-datetime-picker
              class="sm-field-date"
              [label]="'Desde'"
              formControlName="fechaAcceDesde"
            />

            <ui-datetime-picker
              class="sm-field-date"
              [label]="'Hasta'"
              formControlName="fechaAcceHasta"
            />
          </div>

          <div class="sm-crud-filter-button">
            <ui-button
              [label]="'Filtrar'"
              [icon]="'filter_alt'"
              [action]="'filter'"
              (evntClick)="filtrar()"
            />
          </div>
        </div>
      </form>

      <div class="sm-crud-actions">
        <ui-button
          [icon]="'refresh'"
          [action]="'refresh'"
          (evntClick)="refreshData($event)"
        />
      </div>
    </div>

    <div class="sm-crud-table">
      <ui-table-list
        #tableList
        [serviceApi]="'accesos'"
        [serviceApiFilter]="'accesos/filtrar'"
        [serviceApiReal]="'accesos'"
        [columns]="config.columns"
      />
    </div>
  </ui-card>
</div>
