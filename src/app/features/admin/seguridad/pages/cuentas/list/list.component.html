<div class="sm-crud-list">
  <ui-card [showHeader]="true" class="sm-crud-card">
    <div class="sm-crud-toolbar" card-header>
      <form class="sm-crud-form" [formGroup]="formData" (ngSubmit)="filtrar()">
        <div class="sm-crud-filter-row">
          <div class="sm-crud-filters">
            <ui-input-box
              class="sm-field-lg"
              [label]="'Perfil'"
              [options]="opcionesPerfiles"
              formControlName="idePerf"
            />

            <ui-input-box
              class="sm-field-lg"
              [label]="'Empleado'"
              [options]="opcionesEmpleados"
              formControlName="ideEmpl"
            />

            <ui-input-box
              class="sm-field-lg"
              [label]="'Usuario'"
              [options]="opcionesCuenUsuarios"
              [returnValue]="'label'"
              formControlName="usuarioCuen"
            />

            <ui-combo-box
              class="sm-field-sm"
              [label]="'Estado'"
              [options]="opcionesCuenEstados"
              [returnValue]="'label'"
              formControlName="estadoCuen"
            />
          </div>

          <div class="sm-crud-filter-button">
            <ui-button
              [label]="'Filtrar'"
              [icon]="'filter_alt'"
              [action]="'filter'"
              (evntClick)="filtrar()"
            />
          </div>
        </div>
      </form>

      <div class="sm-crud-actions">
        <ui-button
          [icon]="'refresh'"
          [action]="'refresh'"
          (evntClick)="refreshData($event)"
        />
      </div>
    </div>

    <div class="sm-crud-table">
      <ui-table-list
        #tableList
        [serviceApi]="'cuentas'"
        [serviceApiFilter]="'cuentas/filtrar'"
        [serviceApiReal]="'cuentas'"
        [columns]="config.columns"
      />
    </div>
  </ui-card>
</div>
