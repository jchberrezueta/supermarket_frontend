<div class="div_container">
  <div class="div_datetime" [style.width]="controlWidth">
    @if (isTime()) {
      <input
        type="datetime-local"
        required
        [disabled]="_isDisabled()"
        [value]="innerValue()"
        [class.has-value]="hasValue"
        (input)="updateValue($event)"
        (change)="emitValue($event)"
        (blur)="onTouched()"
      />
    } @else {
      <input
        type="date"
        required
        [disabled]="_isDisabled()"
        [value]="innerValue()"
        [class.has-value]="hasValue"
        (input)="updateValue($event)"
        (change)="emitValue($event)"
        (blur)="onTouched()"
      />
    }

    <label>{{ getLabel }}</label>
  </div>
</div>
