<div class="div_container" clickOutside (clickOutside)="open = false">
  <div
    class="div_select"
    [class.active]="open"
    [class.has-value]="hasSelected || getOptionsFiltered !== ''"
    [class.disabled]="isDisabled()"
    [style.width]="controlWidth"
    (click)="toggle()"
  >
    <input
      type="text"
      #inp
      [placeholder]="getPlaceholder"
      [value]="selectedLabel || getOptionsFiltered"
      [disabled]="isDisabled()"
      [attr.aria-label]="getLabel"
      role="combobox"
      [attr.aria-expanded]="open"
      aria-autocomplete="list"
      [class.has-value]="hasSelected || getOptionsFiltered !== ''"
      (input)="optionsFiltered.set(inp.value)"
    />

    <label aria-hidden="true">{{ getLabel }}</label>

    @if (open) {
      <ul class="options">
        @for (opt of filteredItems(); track $index) {
          <li (click)="emitValue(opt, $event)">
            {{ opt.label }}
          </li>
        }

        @if (filteredItems().length === 0) {
          <li class="empty-option">Sin resultados</li>
        }
      </ul>
    }
  </div>
</div>
